name: Build Phone APK + Waydroid .deb Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ============================================
  # JOB 1: Build Signed APK
  # ============================================
  build-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      deb_version: ${{ steps.version.outputs.deb_version }}
      package_name: ${{ steps.package.outputs.package_name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            DEB_VERSION="$VERSION"
          else
            VERSION="manual-$(date +'%Y%m%d-%H%M%S')"
            DEB_VERSION="0.0.0~${VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "deb_version=$DEB_VERSION" >> $GITHUB_OUTPUT
          echo "APK version: $VERSION"
          echo "DEB version: $DEB_VERSION"

      - name: Decode Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Error: RELEASE_KEYSTORE_BASE64 is empty"
            exit 1
          fi
          echo $RELEASE_KEYSTORE_BASE64 | base64 -d > app/release-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Phone signed Split APKs
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -PenableSplits=true

      - name: Find and rename APK
        id: apk
        run: |
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | grep -v "split" | head -1)
          if [ -z "$APK_FILE" ]; then
            APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          cp "$APK_FILE" PixelPlayer.apk
          echo "path=$(pwd)/PixelPlayer.apk" >> $GITHUB_OUTPUT

      - name: Extract package name
        id: package
        run: |
          sudo apt-get update
          sudo apt-get install -y aapt
          PACKAGE_NAME=$(aapt dump badging PixelPlayer.apk | grep "package: name=" | sed "s/package: name='\([^']*\)'.*/\1/")
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "Package: $PACKAGE_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelplayer-apk
          path: PixelPlayer.apk
          retention-days: 7
      
      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: PixelPlayer-split-APKs
          path: app/build/outputs/apk/release/

  # ============================================
  # JOB 2: Build Waydroid .deb Package
  # ============================================
  build-waydroid-deb:
    runs-on: ubuntu-latest
    needs: build-release
    if: success()
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: pixelplayer-apk
          path: ./apk
      
      - name: Get version info
        id: version
        run: |
          VERSION="${{ needs.build-release.outputs.version }}"
          DEB_VERSION="${{ needs.build-release.outputs.deb_version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "deb_version=$DEB_VERSION" >> $GITHUB_OUTPUT
          echo "Building .deb for version: $DEB_VERSION"
      
      - name: Get package name
        id: package
        run: |
          PACKAGE_NAME="${{ needs.build-release.outputs.package_name }}"
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
      
      - name: Build .deb package
        run: |
          mkdir -p pixelplayer_deb/DEBIAN
          mkdir -p pixelplayer_deb/usr/share/pixelplayer
          mkdir -p pixelplayer_deb/usr/share/applications
          
          cp ./apk/PixelPlayer.apk pixelplayer_deb/usr/share/pixelplayer/
          
          cat > pixelplayer_deb/DEBIAN/control << EOF
          Package: pixelplayer-waydroid
          Version: ${{ steps.version.outputs.deb_version }}
          Architecture: all
          Maintainer: VoidX3D <voidx3d@example.com>
          Depends: waydroid (>= 1.2.0), lxc, python3
          Homepage: https://github.com/VoidX3D/PixelPlayer
          Description: PixelPlayer Music App for Linux (Waydroid wrapper)
           PixelPlayer is a modern, feature-rich music player with Material 3 design.
           This package runs the Android version of PixelPlayer using Waydroid.
           .
           Original project: https://github.com/theovilardo/PixelPlayer
           Original author: Theo Vilaro
           Linux packaging maintainer: VoidX3D
          EOF
          
          cat > pixelplayer_deb/DEBIAN/postinst << EOF
          #!/bin/bash
          set -e
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PixelPlayer - Waydroid Setup"
          echo "  Original app by: Theo Vilaro"
          echo "  Linux package by: VoidX3D"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          PACKAGE_NAME="${{ steps.package.outputs.package_name }}"
          APK_PATH="/usr/share/pixelplayer/PixelPlayer.apk"
          
          if ! command -v waydroid &> /dev/null; then
              echo "❌ Waydroid is not installed."
              echo "   Please install it first: sudo apt install waydroid"
              echo "   Then re-run: sudo dpkg --configure -a"
              exit 1
          fi
          
          if [ ! -f /var/lib/waydroid/waydroid.prop ]; then
              echo "📦 Initializing Waydroid..."
              sudo waydroid init
          fi
          
          sudo systemctl enable waydroid-container
          sudo systemctl start waydroid-container
          
          echo "⏳ Waiting for Waydroid session..."
          sleep 8
          
          echo "📱 Installing PixelPlayer..."
          waydroid app install "\$APK_PATH"
          
          echo "✅ PixelPlayer installed!"
          echo "Launch with: waydroid app launch \$PACKAGE_NAME"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          EOF
          chmod +x pixelplayer_deb/DEBIAN/postinst
          
          cat > pixelplayer_deb/DEBIAN/prerm << EOF
          #!/bin/bash
          set -e
          PACKAGE_NAME="${{ steps.package.outputs.package_name }}"
          waydroid app remove "\$PACKAGE_NAME" 2>/dev/null || true
          exit 0
          EOF
          chmod +x pixelplayer_deb/DEBIAN/prerm
          
          cat > pixelplayer_deb/usr/share/applications/pixelplayer.desktop << EOF
          [Desktop Entry]
          Name=PixelPlayer
          Comment=Music player (Original by Theo Vilaro)
          Exec=waydroid app launch ${{ steps.package.outputs.package_name }}
          Icon=pixelplayer
          Terminal=false
          Type=Application
          Categories=Audio;Music;Player;
          EOF
          
          dpkg --build pixelplayer_deb pixelplayer-waydroid_${{ steps.version.outputs.deb_version }}_all.deb
          
          echo "✅ .deb built:"
          ls -la *.deb
      
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelplayer-waydroid_${{ steps.version.outputs.deb_version }}
          path: pixelplayer-waydroid_*.deb
          retention-days: 90
      
      - name: Upload .deb to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: pixelplayer-waydroid_*.deb
          append_body: true
          body: |
            ## 📦 Linux .deb Package (Waydroid)
            
            **Version:** ${{ steps.version.outputs.deb_version }}
            
            ### Installation:
            ```bash
            sudo dpkg -i pixelplayer-waydroid_${{ steps.version.outputs.deb_version }}_all.deb
            sudo apt-get install -f

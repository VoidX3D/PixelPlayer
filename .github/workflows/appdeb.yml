name: Build Phone APK (Signed Bundle) + Waydroid .deb Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # JOB 1: Build the Android APK (your existing workflow)
  build-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      apk_path: ${{ steps.apk_path.outputs.path }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="manual-build"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Error: RELEASE_KEYSTORE_BASE64 is empty. Please add it to GitHub Secrets."
            exit 1
          fi
          echo $RELEASE_KEYSTORE_BASE64 | base64 -d > app/release-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Phone signed Split APKs
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -PenableSplits=true

      - name: Find and rename APK (universal)
        id: apk_path
        run: |
          # Find the universal APK (the one without split config)
          # If you have splits, you might want the "universal" APK
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | grep -v "split" | head -1)
          
          if [ -z "$APK_FILE" ]; then
            # If no universal APK, use any APK
            APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          
          # Rename to standard name
          cp "$APK_FILE" PixelPlayer.apk
          echo "path=$(pwd)/PixelPlayer.apk" >> $GITHUB_OUTPUT
          echo "APK prepared at: $(pwd)/PixelPlayer.apk"

      - name: Upload Phone Split APKs
        uses: actions/upload-artifact@v4
        with:
          name: PixelPlayer-phone-release-split-APKs
          path: app/build/outputs/apk/release/
      
      - name: Upload APK as artifact (for .deb job)
        uses: actions/upload-artifact@v4
        with:
          name: pixelplayer-apk
          path: PixelPlayer.apk
          retention-days: 7

  # JOB 2: Build Waydroid .deb package (NEW)
  build-waydroid-deb:
    runs-on: ubuntu-latest
    needs: build-release  # Wait for APK to be built
    if: success()  # Only run if APK build succeeded
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download APK from build job
        uses: actions/download-artifact@v4
        with:
          name: pixelplayer-apk
          path: ./apk
      
      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="manual-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building .deb for version: $VERSION"
      
      - name: Verify APK exists
        run: |
          ls -la ./apk/
          if [ ! -f ./apk/PixelPlayer.apk ]; then
            echo "ERROR: PixelPlayer.apk not found!"
            exit 1
          fi
          # Get the actual package name from the APK
          sudo apt-get install -y aapt
          PACKAGE_NAME=$(aapt dump badging ./apk/PixelPlayer.apk | grep "package: name=" | sed "s/package: name='\([^']*\)'.*/\1/")
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "Detected package name: $PACKAGE_NAME"
      
      - name: Build .deb package
        run: |
          # Create package structure
          mkdir -p pixelplayer_deb/DEBIAN
          mkdir -p pixelplayer_deb/usr/share/pixelplayer
          mkdir -p pixelplayer_deb/usr/share/applications
          mkdir -p pixelplayer_deb/usr/share/icons/hicolor/256x256/apps
          
          # Copy APK
          cp ./apk/PixelPlayer.apk pixelplayer_deb/usr/share/pixelplayer/
          
          # Create control file
          cat > pixelplayer_deb/DEBIAN/control << EOF
          Package: pixelplayer-waydroid
          Version: ${{ steps.version.outputs.version }}
          Architecture: all
          Maintainer: PixelPlayer Team <pixelplayer@example.com>
          Depends: waydroid (>= 1.2.0), lxc, python3
          Homepage: https://github.com/VoidX3D/PixelPlayer
          Description: PixelPlayer Music App for Linux (Waydroid wrapper)
           PixelPlayer is a modern, feature-rich music player with Material 3 design.
           This package runs the Android version of PixelPlayer using Waydroid,
           providing near-native performance and seamless desktop integration.
           .
           Features:
           * Full music library management
           * Queue and playlist support
           * Beautiful Material 3 UI
           * Gapless playback
          EOF
          
          # Create postinst script
          cat > pixelplayer_deb/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PixelPlayer - Waydroid Setup"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          PACKAGE_NAME="${{ steps.verify.outputs.package_name }}"
          APK_PATH="/usr/share/pixelplayer/PixelPlayer.apk"
          
          # Check if Waydroid is installed
          if ! command -v waydroid &> /dev/null; then
              echo "❌ Waydroid is not installed."
              echo "   Please install it first: sudo apt install waydroid"
              echo "   Then re-run this package configuration."
              exit 1
          fi
          
          # Initialize Waydroid if not already done
          if [ ! -f /var/lib/waydroid/waydroid.prop ]; then
              echo "📦 Initializing Waydroid (this may take a few minutes)..."
              sudo waydroid init
          fi
          
          # Start the container service
          echo "🚀 Starting Waydroid container..."
          sudo systemctl enable waydroid-container
          sudo systemctl start waydroid-container
          
          # Wait for session to be ready
          echo "⏳ Waiting for Waydroid session..."
          sleep 8
          
          # Install the APK
          echo "📱 Installing PixelPlayer APK..."
          waydroid app install "$APK_PATH"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ PixelPlayer installed successfully!"
          echo ""
          echo "You can launch PixelPlayer:"
          echo "  • From your application menu"
          echo "  • Or run: waydroid app launch $PACKAGE_NAME"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          exit 0
          EOF
          chmod +x pixelplayer_deb/DEBIAN/postinst
          
          # Create prerm script (cleanup on removal)
          cat > pixelplayer_deb/DEBIAN/prerm << 'EOF'
          #!/bin/bash
          set -e
          
          PACKAGE_NAME="${{ steps.verify.outputs.package_name }}"
          
          echo "Removing PixelPlayer from Waydroid..."
          waydroid app remove "$PACKAGE_NAME" 2>/dev/null || true
          
          echo "Package removal completed."
          exit 0
          EOF
          chmod +x pixelplayer_deb/DEBIAN/prerm
          
          # Create desktop entry
          cat > pixelplayer_deb/usr/share/applications/pixelplayer.desktop << EOF
          [Desktop Entry]
          Name=PixelPlayer
          Comment=Modern music player
          Exec=waydroid app launch ${{ steps.verify.outputs.package_name }}
          Icon=pixelplayer
          Terminal=false
          Type=Application
          Categories=Audio;Music;Player;
          MimeType=audio/mpeg;audio/flac;audio/ogg;audio/x-wav;
          EOF
          
          # Create a simple icon placeholder (256x256)
          # You can replace this with your actual app icon
          convert -size 256x256 xc:transparent -fill blue -draw "circle 128,128 100,100" \
            pixelplayer_deb/usr/share/icons/hicolor/256x256/apps/pixelplayer.png 2>/dev/null || true
          
          # Build the .deb
          dpkg --build pixelplayer_deb pixelplayer-waydroid_${{ steps.version.outputs.version }}_all.deb
          
          # Verify
          ls -la *.deb
          dpkg --info pixelplayer-waydroid_*.deb || true
      
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelplayer-waydroid_${{ steps.version.outputs.version }}
          path: pixelplayer-waydroid_*.deb
          retention-days: 90
      
      - name: Upload .deb to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: pixelplayer-waydroid_*.deb
          append_body: true
          body: |
            ## 📦 Linux .deb Package (Waydroid)
            
            This package runs PixelPlayer on Linux using Waydroid.
            
            ### Installation:
            ```bash
            sudo dpkg -i pixelplayer-waydroid_*.deb
            sudo apt-get install -f  # Installs Waydroid if needed

name: Build Phone APK (Signed Release)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Error: RELEASE_KEYSTORE_BASE64 is empty. Please add it to GitHub Secrets."
            exit 1
          fi
          echo $RELEASE_KEYSTORE_BASE64 | base64 -d > app/release-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Phone signed APK (Splitted)
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -PenableSplits=true

      - name: Build Phone signed Bundle (AAB)
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease -PenableSplits=false

      - name: Upload Phone Split APKs
        uses: actions/upload-artifact@v4
        with:
          name: PixelPlay-phone-release-APKs-ZIP
          path: app/build/outputs/apk/release/

      - name: Upload Phone Bundle (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: PixelPlay-phone-release-AAB
          path: app/build/outputs/bundle/release/*.aab

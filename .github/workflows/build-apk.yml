name: Build Android Release

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Phone release APK and AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Generate Dynamic Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias releaseAlias -keyalg RSA -keysize 2048 -validity 10000 -storepass pixelplayerkey -keypass pixelplayerkey -dname "CN=PixelPlayer, OU=Android, O=OpenSource, L=World, ST=Earth, C=US"

      - name: Sign APK and AAB
        run: |
          # Sign APK
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign --ks release.keystore --ks-key-alias releaseAlias --ks-pass pass:pixelplayerkey --key-pass pass:pixelplayerkey app/build/outputs/apk/release/app-release-unsigned.apk
          # Rename for output
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release.apk
          
          # Sign AAB using jarsigner
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore release.keystore -storepass pixelplayerkey -keypass pixelplayerkey app/build/outputs/bundle/release/app-release.aab releaseAlias

      - name: Upload Phone Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PixelPlay-phone-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Phone Signed Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: PixelPlay-phone-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
